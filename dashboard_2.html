<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SigninAD AI 調查儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#04071a;--navy2:#080d2a;--blue:#0ea5e9;--blue2:#38bdf8;
  --cyan:#06b6d4;--purple:#8b5cf6;--green:#10b981;--orange:#f59e0b;
  --white:#f0f6ff;--muted:#64748b;--border:rgba(14,165,233,0.15);
  --card:rgba(255,255,255,0.03);--radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;padding:0 0 4rem;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(14,165,233,0.08) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 80%,rgba(139,92,246,0.06) 0%,transparent 60%);
}

/* Header */
.topbar{background:rgba(4,7,26,0.9);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.topbar-left{display:flex;align-items:center;gap:.75rem}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#fff}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--white)}
.logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:1rem}
.live-badge{display:flex;align-items:center;gap:.4rem;padding:.3rem .75rem;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:999px;font-size:11px;color:#34d399}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
.refresh-btn{padding:.35rem .85rem;background:rgba(14,165,233,0.1);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--blue2);cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.refresh-btn:hover{background:rgba(14,165,233,0.2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}

/* Summary cards */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
@media(max-width:700px){.summary-row{grid-template-columns:1fr 1fr}}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;position:relative;overflow:hidden}
.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.summary-card .s-label{font-size:11px;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.08em}
.summary-card .s-value{font-size:28px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--white);line-height:1}
.summary-card .s-sub{font-size:12px;color:var(--muted);margin-top:.3rem}

/* Section title */
.section-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;letter-spacing:.1em;color:var(--blue);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.grid-full{display:grid;grid-template-columns:1fr;gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:750px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* Chart cards */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.chart-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem}
.chart-card-label{font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--blue);text-transform:uppercase;margin-bottom:.25rem}
.chart-card-title{font-size:14px;font-weight:500;color:var(--white)}
.chart-card-count{font-size:11px;color:var(--muted);background:rgba(255,255,255,0.05);padding:.2rem .6rem;border-radius:999px;white-space:nowrap}
.chart-wrap{position:relative}
.chart-wrap canvas{max-height:260px}

/* Bar chart custom */
.bar-list{display:flex;flex-direction:column;gap:.9rem}
.bar-item{}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.3rem}
.bar-name{font-size:13px;color:var(--white);line-height:1.4;flex:1;padding-right:.75rem}
.bar-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.bar-pct{font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.bar-n{font-size:11px;color:var(--muted)}
.bar-track{height:6px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;transition:width .7s cubic-bezier(.4,0,.2,1);width:0}

.no-data{font-size:13px;color:var(--muted);text-align:center;padding:2rem 0}
.loading-pulse{font-size:13px;color:var(--muted);text-align:center;padding:2rem 0;animation:fade .8s ease-in-out infinite alternate}
@keyframes fade{from{opacity:.4}to{opacity:1}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">S</div>
    <div>
      <div class="logo-text">SigninAD</div>
      <div class="logo-sub">AI 素材調查儀表板</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><span class="live-dot"></span>即時更新</div>
    <button class="refresh-btn" onclick="loadData()">↻ 重新整理</button>
  </div>
</div>

<div class="container">
  <!-- Summary -->
  <div class="summary-row">
    <div class="summary-card" style="--accent:linear-gradient(90deg,var(--blue),var(--cyan))">
      <div class="s-label">總樣本數</div>
      <div class="s-value" id="s-total">—</div>
      <div class="s-sub">累積回答份數</div>
    </div>
    <div class="summary-card" style="--accent:linear-gradient(90deg,var(--green),var(--cyan))">
      <div class="s-label">趨勢派</div>
      <div class="s-value" id="s-trend">—</div>
      <div class="s-sub">願意多加嘗試 AI</div>
    </div>
    <div class="summary-card" style="--accent:linear-gradient(90deg,var(--purple),#ec4899)">
      <div class="s-label">保守派</div>
      <div class="s-value" id="s-conservative">—</div>
      <div class="s-sub">偏好傳統方式</div>
    </div>
    <div class="summary-card" style="--accent:linear-gradient(90deg,var(--orange),#ef4444)">
      <div class="s-label">最多人接受的 AI 素材</div>
      <div class="s-value" style="font-size:16px;padding-top:4px" id="s-top-q3">—</div>
      <div class="s-sub">問題 3 最高票</div>
    </div>
  </div>

  <!-- Q1 -->
  <div class="section-title">問題 1　品牌態度總覽</div>
  <div class="grid-2" style="margin-bottom:1.25rem">
    <div class="chart-card">
      <div class="chart-card-header">
        <div>
          <div class="chart-card-label">問題 1</div>
          <div class="chart-card-title">品牌對於使用 AI 素材的態度</div>
        </div>
        <span class="chart-card-count" id="cnt-q1">— 份</span>
      </div>
      <div class="chart-wrap" style="height:220px;display:flex;align-items:center;justify-content:center">
        <canvas id="pie-q1"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header">
        <div>
          <div class="chart-card-label">問題 1 — 詳細分佈</div>
          <div class="chart-card-title">各選項票數比較</div>
        </div>
      </div>
      <div class="bar-list" id="bar-q1"><div class="loading-pulse">載入中…</div></div>
    </div>
  </div>

  <!-- Q2 + Q4 -->
  <div class="section-title">問題 2 ＆ 4　深入分析</div>
  <div class="grid-2" style="margin-bottom:1.25rem">
    <div class="chart-card">
      <div class="chart-card-header">
        <div>
          <div class="chart-card-label">問題 2（保守派回答）</div>
          <div class="chart-card-title">保守派的主要原因</div>
        </div>
        <span class="chart-card-count" id="cnt-q2">— 份</span>
      </div>
      <div class="chart-wrap">
        <canvas id="bar-q2-chart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header">
        <div>
          <div class="chart-card-label">問題 4（趨勢派回答）</div>
          <div class="chart-card-title">目前使用 AI 素材的頻率</div>
        </div>
        <span class="chart-card-count" id="cnt-q4">— 份</span>
      </div>
      <div class="chart-wrap" style="height:220px;display:flex;align-items:center;justify-content:center">
        <canvas id="donut-q4"></canvas>
      </div>
    </div>
  </div>

  <!-- Q3 -->
  <div class="section-title">問題 3　AI 素材接受度</div>
  <div class="grid-full">
    <div class="chart-card">
      <div class="chart-card-header">
        <div>
          <div class="chart-card-label">問題 3（趨勢派複選）</div>
          <div class="chart-card-title">哪些類型的 AI 廣告素材您能接受？</div>
        </div>
        <span class="chart-card-count" id="cnt-q3">— 份</span>
      </div>
      <div class="chart-wrap">
        <canvas id="bar-q3-chart" style="max-height:200px"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://kixyosxzdgyugjfqchcf.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpeHlvc3h6ZGd5dWdqZnFjaGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTIzMTgsImV4cCI6MjA5MjkyODMxOH0.hovZcyDmXEJ6AEJjLYsSHXAPqewSL2tbj8g-JH1-Dbc';

Chart.defaults.color = '#94a3b8';
Chart.defaults.font.family = "'Noto Sans TC', sans-serif";

var charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function countSingle(rows, field) {
  var map = {};
  rows.forEach(function(r) {
    var v = r[field];
    if (!v || v === '略過') return;
    map[v] = (map[v] || 0) + 1;
  });
  return map;
}

function countMulti(rows, field) {
  var map = {};
  rows.forEach(function(r) {
    var v = r[field];
    if (!v || v === '略過' || v === '無') return;
    v.split('、').forEach(function(item) {
      item = item.trim();
      if (item) map[item] = (map[item] || 0) + 1;
    });
  });
  return map;
}

function pct(n, total) { return total ? Math.round(n / total * 100) : 0; }

function renderBarList(containerId, counts, colors) {
  var el = document.getElementById(containerId);
  var entries = Object.entries(counts).sort(function(a,b){return b[1]-a[1];});
  var total = entries.reduce(function(s,e){return s+e[1];},0);
  if (!entries.length) { el.innerHTML = '<div class="no-data">尚無資料</div>'; return; }
  var html = '';
  entries.forEach(function(e, i) {
    var p = pct(e[1], total);
    var color = colors[i % colors.length];
    html += '<div class="bar-item">' +
      '<div class="bar-top">' +
        '<span class="bar-name">' + e[0] + '</span>' +
        '<div class="bar-right">' +
          '<span class="bar-pct" style="color:' + color + '">' + p + '%</span>' +
          '<span class="bar-n">' + e[1] + ' 票</span>' +
        '</div>' +
      '</div>' +
      '<div class="bar-track"><div class="bar-fill" data-pct="' + p + '" style="background:' + color + '"></div></div>' +
    '</div>';
  });
  el.innerHTML = html;
  setTimeout(function() {
    el.querySelectorAll('.bar-fill').forEach(function(b) { b.style.width = b.dataset.pct + '%'; });
  }, 60);
}

function renderPie(canvasId, counts, colors, cutout) {
  destroyChart(canvasId);
  var entries = Object.entries(counts).sort(function(a,b){return b[1]-a[1];});
  var total = entries.reduce(function(s,e){return s+e[1];},0);
  if (!entries.length || total === 0) return;
  var ctx = document.getElementById(canvasId).getContext('2d');
  charts[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: entries.map(function(e){ return e[0]; }),
      datasets: [{
        data: entries.map(function(e){ return e[1]; }),
        backgroundColor: colors.slice(0, entries.length),
        borderColor: '#04071a',
        borderWidth: 3,
        hoverOffset: 8
      }]
    },
    options: {
      cutout: cutout || '60%',
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { padding: 14, font: { size: 12 }, color: '#94a3b8', boxWidth: 12, boxHeight: 12 }
        },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var val = ctx.raw;
              return ' ' + ctx.label + ': ' + val + ' 票 (' + pct(val, total) + '%)';
            }
          }
        }
      }
    }
  });
}

function renderHBar(canvasId, counts, colors) {
  destroyChart(canvasId);
  var entries = Object.entries(counts).sort(function(a,b){return b[1]-a[1];});
  var total = entries.reduce(function(s,e){return s+e[1];},0);
  if (!entries.length || total === 0) {
    document.getElementById(canvasId).parentElement.innerHTML = '<div class="no-data">尚無資料</div>';
    return;
  }
  var ctx = document.getElementById(canvasId).getContext('2d');
  var shortLabels = entries.map(function(e) {
    return e[0].length > 18 ? e[0].substring(0,18) + '…' : e[0];
  });
  charts[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: shortLabels,
      datasets: [{
        data: entries.map(function(e){ return pct(e[1], total); }),
        backgroundColor: entries.map(function(_,i){ return colors[i % colors.length] + 'cc'; }),
        borderColor: entries.map(function(_,i){ return colors[i % colors.length]; }),
        borderWidth: 1.5,
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var idx = ctx.dataIndex;
              return ' ' + entries[idx][1] + ' 票 (' + ctx.raw + '%)';
            }
          }
        }
      },
      scales: {
        x: {
          max: 100,
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { callback: function(v){ return v + '%'; }, color: '#64748b', font: { size: 11 } }
        },
        y: {
          grid: { display: false },
          ticks: { color: '#94a3b8', font: { size: 12 } }
        }
      }
    }
  });
}

async function loadData() {
  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/survey_responses?select=q1,q2,q3,q4', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    var rows = await res.json();
    var total = rows.length;

    // Summary
    document.getElementById('s-total').textContent = total;
    var q1counts = countSingle(rows, 'q1');
    var trendN = 0, consN = 0;
    Object.entries(q1counts).forEach(function(e) {
      if (e[0].indexOf('趨勢') !== -1) trendN = e[1];
      if (e[0].indexOf('保守') !== -1) consN = e[1];
    });
    document.getElementById('s-trend').textContent = trendN + ' 份 (' + pct(trendN,total) + '%)';
    document.getElementById('s-conservative').textContent = consN + ' 份 (' + pct(consN,total) + '%)';
    var q3counts = countMulti(rows, 'q3');
    var topQ3 = Object.entries(q3counts).sort(function(a,b){return b[1]-a[1];})[0];
    document.getElementById('s-top-q3').textContent = topQ3 ? topQ3[0].replace('AI','AI ') : '—';

    // Q1
    document.getElementById('cnt-q1').textContent = total + ' 份';
    renderPie('pie-q1', q1counts, ['#0ea5e9','#8b5cf6','#10b981','#f59e0b'], '55%');
    renderBarList('bar-q1', q1counts, ['#38bdf8','#a78bfa']);

    // Q2
    var q2counts = countMulti(rows, 'q2');
    var q2total = rows.filter(function(r){return r.q2 && r.q2 !== '略過' && r.q2 !== '無';}).length;
    document.getElementById('cnt-q2').textContent = q2total + ' 份';
    renderHBar('bar-q2-chart', q2counts, ['#8b5cf6','#a78bfa','#c4b5fd']);

    // Q3
    var q3total = rows.filter(function(r){return r.q3 && r.q3 !== '略過' && r.q3 !== '無';}).length;
    document.getElementById('cnt-q3').textContent = q3total + ' 份';
    renderHBar('bar-q3-chart', q3counts, ['#10b981','#34d399','#6ee7b7','#a7f3d0']);

    // Q4
    var q4counts = countSingle(rows, 'q4');
    var q4total = rows.filter(function(r){return r.q4 && r.q4 !== '略過';}).length;
    document.getElementById('cnt-q4').textContent = q4total + ' 份';
    renderPie('donut-q4', q4counts, ['#f59e0b','#fb923c','#ef4444'], '60%');

  } catch(e) {
    console.error(e);
  }
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
